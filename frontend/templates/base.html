<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Backtest UI" }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger-bg: #fff1f2;
      --danger-text: #9f1239;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
    }
    header a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 6px; font-size: 24px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    p { color: var(--muted); margin: 0 0 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .strategy-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .strategy-link {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--text);
      text-decoration: none;
      background: #fff;
    }
    .strategy-link strong { display: block; margin-bottom: 6px; }
    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      align-items: end;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      color: var(--text);
      font: inherit;
      background: #fff;
    }
    button, .button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
    button:hover, .button:hover { background: var(--accent-dark); }
    .error {
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid #fecdd3;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 18px;
    }
    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .chart {
      width: 100%;
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .chart svg {
      display: block;
      width: 100%;
      height: 320px;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #eef2f7;
      color: #374151;
      font-size: 12px;
    }
    td a { color: var(--accent-dark); font-weight: 700; }
    .empty { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header><a href="/">Backtest UI</a></header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
